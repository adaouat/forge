# yaml-language-server: $schema=https://raw.githubusercontent.com/adaouat/heraut/v0.21.0/schema.json

version: "1"
versioning:
  strategy: semver
  tag_prefix: v
changelog:
  generator: git-cliff
  output: CHANGELOG.md
release:
  notes:
    generator: git-cliff
  platforms:
    - platform: github
      repository: adaouat/forge
      token_env: GH_TOKEN
