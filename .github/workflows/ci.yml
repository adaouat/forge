name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint + test come from the shared reusable workflow (forge dogfoods its own).
  # forge uses the default 85% coverage threshold.
  ci:
    uses: ./.github/workflows/go-ci.yml

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - name: Build
        run: go build ./...
