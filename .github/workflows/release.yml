name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. v1.2.3). Leave empty to use `heraut version next`."
        required: false
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write # create GitHub Release + push tag
    env:
      HERAUT_CHECK_UPDATE: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # full history for changelog generation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install Héraut
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo adaouat/heraut \
            --pattern "heraut_*_linux_amd64" \
            --output /usr/local/bin/heraut --clobber
          chmod +x /usr/local/bin/heraut

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Configure git identity
        run: |
          git config --global user.name "Héraut Release Bot"
          git config --global user.email "heraut+github@adaouat.dev"

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "VERSION_OVERRIDDEN=true" >> "$GITHUB_ENV"
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip the release block so the bootstrap heraut (which predates
            # fields added in the version being released) does not fail on
            # unknown YAML keys. version next only needs the versioning block.
            yq 'del(.release)' .config/heraut.yml > /tmp/heraut-version.yml
            V=$(HERAUT_FILE=/tmp/heraut-version.yml heraut version next)
            echo "VERSION=$V" >> "$GITHUB_ENV"
            echo "VERSION_OVERRIDDEN=false" >> "$GITHUB_ENV"
            echo "tag=$V" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight check
        run: heraut check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Release
        run: heraut release --version "$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
