name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. v1.2.3). Leave empty to use `heraut version next`."
        required: false
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.setup.outputs.tag }}
    permissions:
      contents: write # create GitHub Release + push tag
    env:
      HERAUT_CHECK_UPDATE: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # full history for changelog generation
          token: ${{ secrets.GITHUB_TOKEN }}

      # mise + heraut + GPG + identity + resolved version (forge ADR-0009).
      - name: Release setup
        id: setup
        uses: ./.github/actions/release-setup
        with:
          gpg-private-key: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ inputs.version }}

      - name: Preflight check
        run: heraut check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Release
        run: heraut release --version "$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
