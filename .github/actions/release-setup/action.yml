name: Release setup (heraut-driven)
description: >-
  Shared prelude for the family's heraut-driven releases: mise, the heraut binary, GPG signing, the release-bot identity, and the resolved version. Checkout stays in the calling workflow (a local-action reference needs the repo checked out first). See forge ADR-0009. #magic___^_^___line
inputs:
  gpg-private-key:
    description: GPG private key — signs the release commit and tag.
    required: true
  github-token:
    description: Token used to download the heraut binary.
    required: true
  version:
    description: Version override; empty resolves via `heraut version next`.
    required: false
    default: ""

outputs:
  version:
    description: The resolved version.
    value: ${{ steps.resolve.outputs.version }}
  tag:
    description: The resolved tag.
    value: ${{ steps.resolve.outputs.tag }}

runs:
  using: composite
  steps:
    - name: Setup Mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

    - name: Install Héraut
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh release download --repo adaouat/heraut \
          --pattern "heraut_*_linux_amd64" \
          --output /usr/local/bin/heraut --clobber
        chmod +x /usr/local/bin/heraut

    - name: Import GPG key
      uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
      with:
        gpg_private_key: ${{ inputs.gpg-private-key }}
        git_user_signingkey: true
        git_commit_gpgsign: true
        git_tag_gpgsign: true

    - name: Configure git identity
      shell: bash
      run: |
        git config --global user.name "Héraut Release Bot"
        git config --global user.email "heraut+github@adaouat.dev"

    - name: Resolve version
      id: resolve
      shell: bash
      env:
        VERSION_INPUT: ${{ inputs.version }}
      run: |-
        if [[ -n "$VERSION_INPUT" ]]; then
          V="$VERSION_INPUT"
          echo "VERSION_OVERRIDDEN=true" >> "$GITHUB_ENV"
        else
          # Strip the release block so the bootstrap heraut (which predates fields added in the
          # version being released) does not fail on unknown YAML keys.
          yq 'del(.release)' .config/heraut.yml > /tmp/heraut-version.yml
          V=$(HERAUT_FILE=/tmp/heraut-version.yml heraut version next)
          echo "VERSION_OVERRIDDEN=false" >> "$GITHUB_ENV"
        fi
        echo "VERSION=$V" >> "$GITHUB_ENV"
        echo "version=$V" >> "$GITHUB_OUTPUT"
        echo "tag=$V" >> "$GITHUB_OUTPUT"
