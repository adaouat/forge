# Annotated GoReleaser template for the adaouat CLI family.
# Copy into <app>/.goreleaser.yml and replace every <app> with the binary name.
# Model: raw versioned binaries (no archive), version injected via ldflags.
# Release-ownership + Homebrew (build-only) variants: docs/guides/distribution.md.
version: 2

project_name: <app>

before:
  hooks:
    - go mod tidy

builds:
  - id: <app>
    main: ./cmd/<app>/
    # Plain name so the Homebrew cask installs the binary as `<app>`; the version
    # lives in the asset name via archives.name_template below.
    binary: <app>
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      # Mandatory: the updatecheck hint is silent on a "dev" version.
      - -X main.Version={{ .Tag }}

# Raw binaries, no tar/zip wrapper (heraut ADR-0013). mise and Homebrew consume
# these directly — no extraction step, no zip-slip surface. The version lives in the
# asset name (builds.binary is plain).
archives:
  - id: default
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Release ownership (see distribution.md). Self-release = this app cuts the GitHub
# Release; the canonical end state is heraut-owned — set `disable: true` so goreleaser
# is build-only and `heraut release --version` creates the release.
release:
  disable: false

# Homebrew cask pushed to the shared tap on release (homebrew_casks, not the deprecated
# `brews`). This is the goreleaser-owned-release form: the default download URL works and
# goreleaser pushes the cask. A build-only app (release.disable: true) additionally needs
# an explicit url.template and a post-release push step — see distribution.md "Homebrew".
homebrew_casks:
  - repository:
      owner: adaouat
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/adaouat/<app>"
    description: "<one-line description>"
